<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" role="img" aria-label="Sunset Esporte Alegria Gastronomia">
  <!-- Três blocos geométricos: raquete, sol, taça -->
  <g>
    <!-- Bloco 1: Raquete (esporte) -->
    <rect x="40" y="20" width="36" height="48" fill="#ED6B23"/>
    <g fill="#FFFFFF">
      <circle cx="48" cy="32" r="1.5"/>
      <circle cx="55" cy="32" r="1.5"/>
      <circle cx="48" cy="40" r="1.5"/>
      <circle cx="55" cy="40" r="1.5"/>
      <circle cx="48" cy="48" r="1.5"/>
      <circle cx="55" cy="48" r="1.5"/>
    </g>
    <path d="M58 24 A14 14 0 0 1 58 60 L58 24" fill="#1E3A5F"/>

    <!-- Bloco 2: Sol -->
    <rect x="80" y="20" width="36" height="48" fill="#1E3A5F"/>
    <circle cx="98" cy="62" r="14" fill="#F5A623"/>
    <circle cx="98" cy="62" r="9" fill="#ED6B23"/>

    <!-- Bloco 3: Taça (gastronomia) -->
    <rect x="120" y="20" width="36" height="48" fill="#ED6B23"/>
    <path d="M126 24 L150 24 L143 38 Q138 42 133 38 Z" fill="#1E3A5F"/>
    <rect x="137.5" y="40" width="2" height="20" fill="#FFFFFF"/>
    <rect x="132" y="60" width="13" height="2" fill="#FFFFFF"/>
  </g>

  <text x="100" y="86" text-anchor="middle" fill="currentColor" font-family="'Poppins',sans-serif" font-weight="600" font-size="14" letter-spacing="6">SUNSET</text>
  <text x="100" y="100" text-anchor="middle" fill="currentColor" font-family="'Inter',sans-serif" font-weight="400" font-size="6" letter-spacing="1">esporte • alegria • gastronomia</text>
</svg>
